allowBuilds:
  '@bufbuild/buf': true
  '@scarf/scarf': true
  esbuild: true
  protobufjs: true
  unrs-resolver: true
ignoredBuiltDependencies:
  - '@scarf/scarf'
  - unrs-resolver
minimumReleaseAgeExclude:
  - '@eslint/plugin-kit@0.7.2'
  - eslint@10.4.1
onlyBuiltDependencies:
  - esbuild
  - protobufjs
